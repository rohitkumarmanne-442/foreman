name: "Foreman Agent Review Gate"
description: "Block PRs with unreviewed risky AI-agent sessions, and surface Foreman findings as native GitHub code-scanning annotations."
author: "rohitkumarmanne-442"
branding:
  icon: "shield"
  color: "blue"

inputs:
  level:
    description: "Minimum risk level that blocks the merge (critical | high | medium)."
    required: false
    default: "high"
  sarif:
    description: "Also write a SARIF file of all findings (path, empty to skip)."
    required: false
    default: "foreman.sarif"

outputs:
  sarif:
    description: "Path of the SARIF file (feed it to github/codeql-action/upload-sarif)."
    value: ${{ inputs.sarif }}

runs:
  using: "composite"
  steps:
    - name: Install Foreman
      shell: bash
      run: npm install -g foremanjs

    - name: Import team review packs
      shell: bash
      # .foreman-team/*.json are ed25519-signed session packs committed by
      # `foreman team sync` on developer machines — the CI journal starts empty.
      run: |
        if [ -d .foreman-team ]; then
          foreman team sync
        else
          echo "No .foreman-team/ packs — falling back to pure-CI diff scan (no local setup needed)."
        fi

    - name: Gate (team packs) or scan the diff (zero-setup)
      shell: bash
      # Two modes:
      #  · team mode  — devs run foreman locally + `foreman team sync`; CI blocks
      #    on sessions no human approved, with full claims/commands evidence.
      #  · pure CI    — nobody installed anything locally: `foreman scan` runs the
      #    risk rules straight on the git diff (secrets, sensitive paths, mass
      #    deletions) and blocks on those. Rogue remote-agent commits still get
      #    caught.
      run: |
        if [ -d .foreman-team ]; then
          if [ -n "${{ inputs.sarif }}" ]; then foreman report --sarif --out "${{ inputs.sarif }}"; fi
          foreman gate --level "${{ inputs.level }}"
        else
          BASE="origin/${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF:-main}" || BASE="HEAD^"
          foreman scan --base "$BASE" --level "${{ inputs.level }}" ${{ inputs.sarif != '' && format('--sarif {0}', inputs.sarif) || '' }}
        fi
